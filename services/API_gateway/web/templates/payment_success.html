<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Payment Successful</title>
    <link rel="stylesheet" href="/static/css/payment.css" />
  </head>
  <body>
    <div class="spotlight spotlight--green"></div>

    <div class="payment-card">
      <div class="status-icon status-icon--success">
        <svg viewBox="0 0 40 40" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <polyline points="8 21 16 29 32 11" />
        </svg>
      </div>

      <div class="payment-header">
        <p class="payment-label">Transaction Complete</p>
        <h1>PAYMENT<br><span>SUCCESS.</span></h1>
      </div>

      <p class="payment-desc">
        Your plan has been activated. Jobs are now running and your monthly limit has been updated.
      </p>

      <div class="payment-divider"></div>

      <a href="/" class="btn-action btn-action--primary">
        <svg viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5" width="14" height="14">
          <path d="M1 8h14M9 2l6 6-6 6"/>
        </svg>
        Go to Dashboard
      </a>
    </div>
  </body>
</html>
