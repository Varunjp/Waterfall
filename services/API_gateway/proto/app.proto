syntax = "proto3";

package admin;

option go_package = "internal/proto/adminpb";

import "googleapis/google/api/annotations.proto";
import "google/protobuf/empty.proto";

service AppService {
  rpc RegisterApp(RegisterAppRequest) returns (RegisterAppResponse) {
    option (google.api.http) = {
      post: "/api/v1/apps"
      body: "*"
    };
  }

  rpc ListApps(ListAppsRequest) returns (ListAppsResponse) {
    option (google.api.http) = {
      get: "/api/v1/apps"
    };
  }

  rpc BlockApp(BlockAppRequest) returns (google.protobuf.Empty) {
    option (google.api.http) = {
      patch: "/api/v1/apps/{app_id}/block"
      body: "*"
    };
  }

  rpc UnblockApp(BlockAppRequest) returns (google.protobuf.Empty) {
    option (google.api.http) = {
      patch: "/api/v1/apps/{app_id}/unblock"
      body: "*"
    };
  }
}

message RegisterAppRequest {
  string app_name = 1;
  string app_email = 2;
}

message RegisterAppResponse {
  string app_id = 1;
}

message ListAppsRequest {}

message ListAppsResponse {
  repeated App apps = 1;
}

message App {
  string app_id = 1;
  string app_name = 2;
  string app_email = 3;
  string status = 4;
  string tier = 5;
}

message BlockAppRequest {
  string app_id = 1;
}
