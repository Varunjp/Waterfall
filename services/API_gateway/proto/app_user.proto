syntax = "proto3";

package admin;

option go_package = "internal/proto/adminpb";

import "google/protobuf/timestamp.proto";
import "googleapis/google/api/annotations.proto";
import "google/protobuf/empty.proto";

service AppUserService {
  rpc CreateUser(CreateUserRequest) returns (google.protobuf.Empty) {
    option (google.api.http) = {
      post: "/api/v1/users"
      body: "*"
    };
  }

  rpc UpdateUser(UpdateUserRequest) returns (google.protobuf.Empty) {
    option (google.api.http) = {
      patch: "/api/v1/users/{user_id}"
      body: "*"
    };
  }

  rpc ListUsers(ListUsersRequest) returns (ListUsersResponse) {
    option (google.api.http) = {
      get: "/api/v1/users"
    };
  }

  rpc ListAppUsers(ListAppUserRequest) returns (ListAppUserResponse) {
    option (google.api.http) = {
      get: "/api/v1/apps/{app_id}/users"
    };
  }

  rpc AppLogin(AppLoginRequest) returns (AppLoginResponse) {
    option (google.api.http) = {
      post: "/api/v1/users/login"
      body: "*"
    };
  }
  
  rpc ListPlans(ListPlansRequest) returns (ListPlansResponse) {
    option (google.api.http) = {
      get: "/api/v1/plans"
    };
  }

  rpc RequestResetPassword(RequestResetPasswordRequest) returns (RequestResetPasswordResponse) {
    option (google.api.http) = {
      post: "/api/v1/users/password/reset/request"
      body: "*"
    };
  }

  rpc VerifyPasswordResetOtp(VerifyPasswordResetOtpRequest)
      returns (VerifyPasswordResetOtpResponse) {
        option (google.api.http) = {
          post: "/api/v1/users/password/reset/verify"
          body: "*"
        };
      }

  rpc ResetPassword(ResetPasswordRequest)
      returns (ResetPasswordResponse) {
        option (google.api.http) = {
          post: "/api/v1/users/password/reset"
          body: "*"
        };
      }
  
  rpc UpdateUserStatus(UpdateUserStatusRequest) returns (google.protobuf.Empty) {
    option (google.api.http) = {
      post: "/api/v1/users/{user_id}/status"
      body: "*"
    };
  }

  rpc ListPayments(ListPaymentRequest) returns (ListPaymentResponse) {
    option (google.api.http) = {
      get: "/api/v1/users/payments"
    };
  }

  rpc GetInvoice(GetInvoiceRequest) returns (GetInvoiceResponse) {
    option (google.api.http) = {
      get: "/api/v1/invoice/{invoice_id}"
    };
  }
}

message AppLoginRequest {
  string email = 1;
  string password = 2;
}

message AppLoginResponse {
  string access_token = 1;
}

message RequestResetPasswordRequest {
  string email = 1;
}

message RequestResetPasswordResponse {
  string message = 1;
}

message VerifyPasswordResetOtpRequest {
  string email = 1;
  string otp = 2;
}

message VerifyPasswordResetOtpResponse {
  string reset_token = 1;
}

message ResetPasswordRequest {
  string reset_token = 1;
  string new_password = 2;
}

message ResetPasswordResponse {
  string message = 1;
}

message CreateUserRequest {
  string email = 1;
  string password = 2;
  string role = 3;
}

message ListUsersRequest {}

message ListAppUserRequest{
  string app_id = 1;
}

message AppUser {
  string id = 1;
  string email = 2;
  string role = 3;
  string status = 4;
}

message ListUsersResponse {
  repeated AppUser users = 1;
}

message ListAppUserResponse {
  repeated AppUser users = 1;
}

message ListPlansRequest {}

message UserPlan {
  string plan_id = 1;
  string planName = 2;
  int32 monthlyLimit = 3;
  double planprice = 4;
}

message ListPlansResponse {
  repeated UserPlan plans = 1;
}

message UpdateUserStatusRequest {
  string user_id = 1;
  string status = 2;
}

message UpdateUserRequest {
  string user_id = 1;
  string role = 2;
  string password = 3;
}

message ListPaymentRequest {
  string status = 1;
  int32 limit = 2;
  int32 offset = 3;
  google.protobuf.Timestamp startDate = 4;
  google.protobuf.Timestamp endDate = 5;
}

message ListPaymentResponse {
  repeated Payment payments = 1;
  int32 total = 2;
  int32 limit = 3;
  int32 offset = 4;
}

message Payment {
  string invoice_id = 1;
  string plan_name = 2;
  double amount = 3;
  string status = 4;
  string paid_at = 5;
}

message GetInvoiceRequest {
    string invoice_id = 1;
}

message GetInvoiceResponse {
    bytes pdf = 1;
    string filename = 2;
}