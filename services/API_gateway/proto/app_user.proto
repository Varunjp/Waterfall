syntax = "proto3";

package admin;

option go_package = "internal/proto/adminpb";

import "googleapis/google/api/annotations.proto";
import "google/protobuf/empty.proto";

service AppUserService {
  rpc CreateUser(CreateUserRequest) returns (google.protobuf.Empty) {
    option (google.api.http) = {
      post: "/api/v1/users"
      body: "*"
    };
  }

  rpc ListUsers(ListUsersRequest) returns (ListUsersResponse) {
    option (google.api.http) = {
      get: "/api/v1/users"
    };
  }

  rpc AppLogin(AppLoginRequest) returns (AppLoginResponse) {
    option (google.api.http) = {
      post: "/api/v1/users/login"
      body: "*"
    };
  }
  
  rpc ListPlans(ListPlansRequest) returns (ListPlansResponse) {
    option (google.api.http) = {
      get: "/api/v1/plans"
    };
  }

  rpc RequestResetPassword(RequestResetPasswordRequest) returns (RequestResetPasswordResponse) {
    option (google.api.http) = {
      post: "/api/v1/users/password/reset/request"
      body: "*"
    };
  }

  rpc VerifyPasswordResetOtp(VerifyPasswordResetOtpRequest)
      returns (VerifyPasswordResetOtpResponse) {
        option (google.api.http) = {
          post: "/api/v1/users/password/reset/verify"
          body: "*"
        };
      }

  rpc ResetPassword(ResetPasswordRequest)
      returns (ResetPasswordResponse) {
        option (google.api.http) = {
          post: "/api/v1/users/password/reset"
          body: "*"
        };
      }
  
  rpc UpdateUserStatus(UpdateUserStatusRequest) returns (google.protobuf.Empty) {
    option (google.api.http) = {
      post: "/api/v1/users/{user_id}/status"
      body: "*"
    };
  }
}

message AppLoginRequest {
  string email = 1;
  string password = 2;
}

message AppLoginResponse {
  string access_token = 1;
}

message RequestResetPasswordRequest {
  string email = 1;
}

message RequestResetPasswordResponse {
  string message = 1;
}

message VerifyPasswordResetOtpRequest {
  string email = 1;
  string otp = 2;
}

message VerifyPasswordResetOtpResponse {
  string reset_token = 1;
}

message ResetPasswordRequest {
  string reset_token = 1;
  string new_password = 2;
}

message ResetPasswordResponse {
  string message = 1;
}

message CreateUserRequest {
  string email = 1;
  string password = 2;
  string role = 3;
  string app_id = 4;
}

message ListUsersRequest {}

message AppUser {
  string id = 1;
  string email = 2;
  string role = 3;
  string status = 4;
}

message ListUsersResponse {
  repeated AppUser users = 1;
}

message ListPlansRequest {}

message UserPlan {
  string plan_id = 1;
  string planName = 2;
  int32 monthlyLimit = 3;
  double planprice = 4;
}

message ListPlansResponse {
  repeated UserPlan plans = 1;
}

message UpdateUserStatusRequest {
  string user_id = 1;
  string status = 2;
}