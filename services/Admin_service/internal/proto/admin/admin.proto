syntax = "proto3";

package admin;

option go_package = "internal/proto/admin;adminpb";

import "googleapis/google/api/annotations.proto";

service AdminService {
    rpc Login(LoginRequest) returns (LoginResponse) {
        option (google.api.http) = {
            post: "/api/v1/admin/login"
            body: "*"
        };
    }

    rpc CreatePlan(CreatePlanRequest) returns (CreatePlanResponse) {
        option (google.api.http) = {
            post: "/api/v1/admin/plans"
            body: "*"
        };
    }

    rpc ListPlans(ListPlanRequest) returns (ListPlanResponse) {
        option (google.api.http) = {
            get: "/api/v1/admin/plans"
        };
    }
    
    rpc UpdatePlan(UpdatePlanRequest) returns (UpdatePlanResponse) {
        option (google.api.http) = {
            put: "/api/v1/admin/plans/{planID}"
            body: "*"
        };
    }

    rpc UpdatePlanStatus(UpdatePlanStatusRequest) returns(UpdatePlanStatusResponse) {
        option (google.api.http) = {
            patch: "/api/v1/admin/plans/{planID}/status"
            body:"*"
        };
    }
}

message LoginRequest {
    string email = 1;
    string password = 2;
}

message LoginResponse {
    string access_token = 1;
}

message CreatePlanRequest {
    string name = 1;
    int32  joblimit = 2;
    double price = 3;
    string stripePriceID = 4;
}

message CreatePlanResponse {
    string message = 1;
}

message ListPlanRequest {}

message Plan {
    string planID = 1;
    string name = 2;
    int32  jobLimit = 3;
    double price = 4;
    string stripePriceID = 5;
    string status = 6;
}

message ListPlanResponse {
    repeated Plan plans = 1;
}

message UpdatePlanRequest {
    string planID = 1;
    string name = 2;
    int32  jobLimit = 3;
    double price = 4;
    string stripePriceID = 5;
}

message UpdatePlanResponse {
    Plan updatedPlan = 1;
}

message UpdatePlanStatusRequest {
    string planID = 1;
    string status = 2;
}

message UpdatePlanStatusResponse {
    Plan plan = 1;
}