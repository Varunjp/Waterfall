syntax = "proto3";

package admin;

option go_package = "internal/proto/admin;adminpb";

import "google/protobuf/timestamp.proto";
import "googleapis/google/api/annotations.proto";

service AdminService {
    rpc Login(LoginRequest) returns (LoginResponse) {
        option (google.api.http) = {
            post: "/api/v1/admin/login"
            body: "*"
        };
    }

    rpc CreatePlan(CreatePlanRequest) returns (CreatePlanResponse) {
        option (google.api.http) = {
            post: "/api/v1/admin/plans"
            body: "*"
        };
    }

    rpc ListPlans(ListPlanRequest) returns (ListPlanResponse) {
        option (google.api.http) = {
            get: "/api/v1/admin/plans"
        };
    }
    
    rpc UpdatePlan(UpdatePlanRequest) returns (UpdatePlanResponse) {
        option (google.api.http) = {
            put: "/api/v1/admin/plans/{planID}"
            body: "*"
        };
    }

    rpc UpdatePlanStatus(UpdatePlanStatusRequest) returns(UpdatePlanStatusResponse) {
        option (google.api.http) = {
            patch: "/api/v1/admin/plans/{planID}/status"
            body:"*"
        };
    }

    rpc ListPayments(ListPaymentAdminRequest) returns (ListPaymentAdminResponse) {
        option (google.api.http) = {
        get: "/api/v1/admin/payments"
        };
    }

    rpc GetAdminInvoice(GetAdminInvoiceRequest) returns (GetAdminInvoiceResponse) {}
}

message LoginRequest {
    string email = 1;
    string password = 2;
}

message LoginResponse {
    string access_token = 1;
}

message CreatePlanRequest {
    string name = 1;
    int32  joblimit = 2;
    double price = 3;
    string stripePriceID = 4;
}

message CreatePlanResponse {
    string message = 1;
}

message ListPlanRequest {}

message Plan {
    string planID = 1;
    string name = 2;
    int32  jobLimit = 3;
    double price = 4;
    string stripePriceID = 5;
    string status = 6;
}

message ListPlanResponse {
    repeated Plan plans = 1;
}

message UpdatePlanRequest {
    string planID = 1;
    string name = 2;
    int32  jobLimit = 3;
    double price = 4;
    string stripePriceID = 5;
}

message UpdatePlanResponse {
    Plan updatedPlan = 1;
}

message UpdatePlanStatusRequest {
    string planID = 1;
    string status = 2;
}

message UpdatePlanStatusResponse {
    Plan plan = 1;
}

message ListPaymentAdminRequest {
  string app_id = 1;
  string status = 2;
  int32 limit = 3;
  int32 offset = 4;
  google.protobuf.Timestamp startDate = 5;
  google.protobuf.Timestamp endDate = 6;
}

message ListPaymentAdminResponse {
  repeated PaymentAdmin payments = 1;
  int32 total = 2;
  int32 limit = 3;
  int32 offset = 4;
}

message PaymentAdmin {
  string invoice_id = 1;
  string plan_name = 2;
  double amount = 3;
  string status = 4;
  string paid_at = 5;
  string app_name = 6;
  string app_email = 7;
  double plan_amount = 8;
}

message GetAdminInvoiceRequest {
    string invoice_id = 1;
}

message GetAdminInvoiceResponse {
    bytes pdf = 1;
    string filename = 2;
}