syntax = "proto3";

package job;

option go_package = "internal/proto/jobpb";

import "google/protobuf/timestamp.proto";
import "googleapis/google/api/annotations.proto";

service JobService {
    rpc CreateJob(CreateJobRequest) returns (JobResponse) {
      option (google.api.http) = {
          post: "/api/v1/jobs"
          body: "*"
      };
    }

    rpc UpdateJob(UpdateJobRequest) returns (JobResponse) {
      option (google.api.http) = {
          put: "/api/v1/jobs/{job_id}"
          body: "*"
      };
    }

    rpc CancelJob(CancelJobRequest) returns (JobResponse) {
      option (google.api.http) = {
          delete: "/api/v1/jobs/{job_id}"
      };
    }

    rpc ListJobs(ListJobsRequest) returns (ListJobsResponse) {
      option (google.api.http) = {
          get: "/api/v1/jobs"
      };
    }

    rpc ListFailedJobs(ListFailedJobsRequest) returns (ListJobsResponse) {
      option (google.api.http) = {
          get: "/api/v1/jobs/failed"
      };
    }
    
    rpc GetJobLogs(GetJobLogsRequest) returns (GetJobLogsResponse) {
      option (google.api.http) = {
          get: "/api/v1/jobs/{job_id}/logs"
      };
    }

    rpc GetJobAdminLogs(GetJobLogsAdminRequest) returns (GetJobLogsResponse);

    rpc RetryJob(RetryJobRequest) returns (RetryJobResponse) {
      option (google.api.http) = {
          post: "/api/v1/jobs/{job_id}/retry"
          body: "*"
      };
    }
}

message CreateJobRequest {
    string app_id = 1;
    string type = 2;
    string payload = 3;
    google.protobuf.Timestamp schedule_at = 4;
}

message UpdateJobRequest {
    string job_id = 1;
    string payload = 2;
    google.protobuf.Timestamp schedule_at = 3;
}

message CancelJobRequest {
    string job_id = 1;
}

message JobResponse {
    string job_id = 1;
    string status = 2;
}

message ListJobsRequest {
  string status = 1;
  int32 limit = 2;
  int32 offset = 3;
  google.protobuf.Timestamp startDate = 4;
  google.protobuf.Timestamp endDate = 5;
}

message ListFailedJobsRequest {
  int32 limit = 1;
  int32 offset = 2;
}

message Job {
  string job_id = 1;
  string app_id = 2;
  string type = 3;
  string status = 4;
  string payload = 5;
  int32 retry = 6;
  int32 max_retry = 7;
  string schedule_at = 8;
  string created_at = 9;
  string updated_at = 10;
  int32 manual_retry =11;
}

message ListJobsResponse {
  repeated Job jobs = 1;
  int32 total = 2;
  int32 limit = 3;
  int32 offset = 4;
}

message GetJobLogsRequest {
  string job_id = 1;
}

message GetJobLogsAdminRequest {
  string job_id = 1;
}

message JobLog {
  string timestamp = 1;
  string status = 2;
  string errorMessage = 3;
}

message GetJobLogsResponse {
  repeated JobLog logs = 1;
}

message RetryJobRequest {
  string job_id = 1;
}

message RetryJobResponse {
  string new_job_id = 1;
}
